name: Deploy to GitHub Pages

# Publishes the static site whenever main changes.
# One-time setup: Repo Settings -> Pages -> "Build and deployment" ->
# Source: "GitHub Actions". The custom domain (CNAME) is preserved.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root is the site root (index.html lives here).
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
