name: Deploy to GitHub Pages

# Publishes the static site whenever main changes.
#
# Setup: Repo Settings -> Pages -> "Build and deployment" -> Source:
# "GitHub Actions". The `enablement: true` below also lets this workflow
# turn Pages on automatically the first time it runs, so a fresh repo
# does not fail with "Get Pages site failed / Not Found".
# The custom domain (CNAME file) is preserved.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages automatically if it isn't already,
          # so the first run on a new repo doesn't fail.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root is the site root (index.html lives here).
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
