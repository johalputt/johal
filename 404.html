<style>
  :root{
    --charcoal:#07080f;--saffron:#FF6B00;--gold:#D4A017;--cream:#F5F0E8;
    --ink-65:rgba(245,240,232,.65);--ink-45:rgba(245,240,232,.45);
    --ink-22:rgba(245,240,232,.22);--ink-06:rgba(245,240,232,.06);
    --line:rgba(245,240,232,.10);--ease:cubic-bezier(.22,.61,.36,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    min-height:100svh;display:grid;place-items:center;text-align:center;
    background:var(--charcoal);color:var(--cream);
    font-family:"Inter",system-ui,-apple-system,sans-serif;line-height:1.6;
    padding:clamp(24px,6vw,64px);overflow-x:hidden;position:relative;isolation:isolate;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--saffron);color:var(--charcoal)}
  /* divine glow + grain, same language as the hero */
  body::before{
    content:"";position:absolute;inset:-20%;z-index:-2;
    background:
      radial-gradient(50% 45% at 50% 0%,rgba(255,107,0,.20),transparent 70%),
      radial-gradient(45% 45% at 80% 30%,rgba(212,160,23,.14),transparent 72%),
      radial-gradient(45% 45% at 18% 80%,rgba(255,107,0,.08),transparent 72%);
  }
  body::after{
    content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 10%,transparent 45%,rgba(7,8,15,.55) 80%,var(--charcoal) 100%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);
  }
  .wrap{max-width:620px;animation:rise .9s var(--ease) both}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.wrap{animation:none}.om{animation:none}}

  .om{
    font-family:"Tiro Devanagari Hindi",serif;font-size:clamp(54px,12vw,86px);
    color:var(--saffron);line-height:1;display:inline-block;
    animation:glow 4s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{text-shadow:0 0 14px rgba(255,107,0,.3)}50%{text-shadow:0 0 30px rgba(255,107,0,.7)}}

  .code{
    font-family:"JetBrains Mono",monospace;font-size:clamp(64px,18vw,140px);
    font-weight:500;letter-spacing:.04em;margin-top:10px;line-height:.9;
    background:linear-gradient(180deg,var(--cream),#cdbfa6 130%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hi{font-family:"Tiro Devanagari Hindi",serif;font-size:clamp(22px,5vw,34px);color:var(--gold);margin-top:14px}
  h1{font-weight:800;font-size:clamp(20px,4vw,28px);letter-spacing:-.01em;margin-top:8px}
  p.lead{color:var(--ink-65);margin-top:18px;font-size:clamp(15px,2.2vw,18px)}

  .actions{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:34px}
  .btn{
    display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:999px;
    font-weight:600;font-size:15px;border:1px solid transparent;
    transition:transform .25s var(--ease),box-shadow .35s,border-color .3s,color .3s;
  }
  .btn svg{width:18px;height:18px}
  .btn-primary{
    background:linear-gradient(180deg,var(--saffron),#d85a00);color:var(--cream);
    box-shadow:0 14px 40px -14px rgba(255,107,0,.8),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 22px 54px -16px rgba(255,107,0,.95)}
  .btn-ghost{border-color:var(--ink-22);color:var(--cream);background:var(--ink-06)}
  .btn-ghost:hover{transform:translateY(-3px);border-color:var(--gold);color:var(--gold)}

  .sep{height:1px;width:120px;margin:38px auto 0;background:linear-gradient(90deg,transparent,var(--line),transparent)}
  .foot{margin-top:22px;font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.14em;color:var(--ink-45)}
  .foot a{color:var(--gold);text-decoration:none;transition:color .25s}
  .foot a:hover{color:var(--saffron)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="om" aria-hidden="true">ॐ</div>
    <div class="code">404</div>
    <div class="hi">यह मार्ग कहीं नहीं जाता</div>
    <h1>This path leads nowhere</h1>
    <p class="lead">The page you were seeking could not be found — but the Jathere always welcomes you home. Let the elders guide you back.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/></svg>
        Return Home
      </a>
      <a class="btn btn-ghost" href="/#contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.8a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>
        Contact
      </a>
    </div>

    <div class="sep"></div>
    <div class="foot">जोहल वंश जठेरे · <a href="/">jathere.johal.in</a></div>
  </main>
</body>
</html>
